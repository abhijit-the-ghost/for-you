<!doctype html>
<html lang="en" data-theme="rosepetal">
  <head>
    <meta charset="UTF-8" />

    <!-- Optimized Favicon -->
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title: Change this to something personal! -->
    <title>For My Forever 💖</title>
    <meta
      name="description"
      content="A digital scrapbook of every sweet moment we've shared."
    />

    <!-- Social Media Preview (WhatsApp/IG/FB) -->
    <meta property="og:title" content="Our Story ✨" />
    <meta
      property="og:description"
      content="Every route is soft, sweet, and full of warm moments."
    />
    <meta property="og:image" content="/favicon.jpg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Reenie+Beanie&family=Quicksand:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* 1. Global Custom Selection (When she highlights text) */
      ::selection {
        background-color: #f472b6; /* Pink-400 */
        color: white;
      }

      /* 2. Custom Heart Cursor */
      body {
        margin: 0;
        font-family: "Quicksand", sans-serif;
        /* Replace emoji with a small custom cursor if you prefer */
        cursor:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='48' style='font-size:24px'><text y='22'>💖</text></svg>"),
          auto;
      }

      /* 3. Pre-loader styles */
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #fff5f7; /* Soft pink background */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      .loader-heart {
        font-size: 50px;
        animation: heartbeat 1.2s infinite;
      }

      @keyframes heartbeat {
        0% {
          transform: scale(1);
        }
        14% {
          transform: scale(1.3);
        }
        28% {
          transform: scale(1);
        }
        42% {
          transform: scale(1.3);
        }
        70% {
          transform: scale(1);
        }
      }

      .loader-text {
        margin-top: 15px;
        font-family: "Dancing Script", cursive;
        color: #db2777;
        font-size: 1.5rem;
        letter-spacing: 1px;
      }

      /* Scrollbar Styling */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #fbcfe8;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #f472b6;
      }
    </style>
  </head>
  <body>
    <!-- Preloader shows until React is ready -->
    <div id="preloader">
      <div class="loader-heart">💖</div>
      <div class="loader-text">Opening our memories...</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      // Remove preloader when the window finishes loading
      window.addEventListener("load", () => {
        const preloader = document.getElementById("preloader");
        setTimeout(() => {
          if (preloader) {
            preloader.style.opacity = "0";
            setTimeout(() => (preloader.style.display = "none"), 500);
          }
        }, 1000); // 1 second delay for a smooth feel
      });
    </script>
  </body>
</html>
